<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="build/main.css">
    <title>Loja de Roupas - Metodologia BEM</title>
</head>
<body>
    <div class="products">
        <h1 class="products__title">Loja De Roupas</h1>
        <div class="products__container">
            <div class="product">
                <img class="product__image" src="/imagens/roupa-2.jpg" alt="Produto 1">
                <h4 class="product__name">Calça Jeans Premium</h4>
                <p class="product__description">
                    Descrição detalhada do produto com foco em qualidade e estilo.
                </p>
                <a href="#" class="product__button">
                    Ver Detalhes
                </a>
            </div>

            <div class="product product--highlight">
                <img class="product__image" src="/imagens/roupa-de-frio.jpg" alt="Produto 2">
                <h4 class="product__name">Casaco de Inverno</h4>
                <p class="product__description">
                    Ideal para dias frios, com forro térmico e design moderno.
                </p>
                <a href="#" class="product__button">
                    Comprar Agora
                </a>
            </div>

            <div class="product product--highlight">
                <img class="product__image" src="/imagens/roupas-3.jpg" alt="Produto 3">
                <h4 class="product__name">Saia</h4>
                <p class="product__description">
                    Conforto e durabilidade para o seu dia a dia.
                </p>
                <a href="#" class="product__button">
                    Ver Mais
                </a>
            </div>
        </div>
    </div>
</body>
</html>
